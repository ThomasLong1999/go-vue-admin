<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go-Vue-Admin 后台管理系统</title>
  </head>
  <body>
    <!-- 【知识点】Vue 单页应用(SPA): 整个网站只有一个 HTML 文件 -->
    <!-- 所有页面内容都通过 JavaScript 动态渲染 -->
    <!-- #app 是 Vue 应用的挂载点，Vue 会接管这个元素 -->
    <div id="app"></div>
    <!-- Vite 入口: 引入 main.ts 启动 Vue 应用 -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
