# 复制为 config.yaml 后按本机环境修改。
# 环境变量会覆盖同名配置，例如 JWT_SECRET、DATABASE_PASSWORD。

server:
  port: 8080
  mode: debug

database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: ""
  dbname: go_vue_admin
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

jwt:
  secret: "replace-this-with-a-local-development-secret-at-least-32-characters-long"
  expire_hours: 24

bootstrap:
  admin_username: admin
  admin_password: admin123
