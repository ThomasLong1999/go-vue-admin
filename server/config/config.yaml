# ============================================
# go-vue-admin 配置文件
# ============================================
# 这个文件使用 YAML 格式，Go 程序启动时会读取它
# YAML 是一种比 JSON 更易读的配置格式，支持注释

# 服务器配置
server:
  # 监听端口，HTTP 服务默认 8080
  port: 8080
  # 运行模式：debug(开发) / release(生产)
  # debug 模式下 Gin 会打印详细的路由日志
  mode: debug

# MySQL 数据库配置
# 连接 WSL 中的 MySQL（WSL2 mirrored 模式下 localhost 可直连）
database:
  host: 127.0.0.1
  port: 3306
  user: longtao
  password: "longtao"
  dbname: go_vue_admin
  # 最大空闲连接数：连接池中保持的最少连接
  max_idle_conns: 10
  # 最大打开连接数：连接池最多允许的连接
  max_open_conns: 100
  # 连接最大存活时间（秒），超时会被关闭
  conn_max_lifetime: 3600

# Redis 缓存配置
# 连接 WSL 中的 Redis
redis:
  host: 127.0.0.1
  port: 6379
  # Redis 密码，没有设置密码则为空
  password: ""
  # Redis 数据库编号（0-15），默认使用 0
  db: 0

# JWT 配置
jwt:
  # JWT 密钥，用于签名和验证 Token
  # 生产环境必须使用足够复杂的随机字符串
  secret: "go-vue-admin-secret-key-2024"
  # Token 过期时间（小时）
  expire_hours: 24
